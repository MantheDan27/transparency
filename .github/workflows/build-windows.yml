name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cpp:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
    - name: Configure CMake
      run: cmake -B build -S transparency-cpp -DCMAKE_BUILD_TYPE=Release
    - name: Build Transparency C++ App
      run: cmake --build build --config Release
    - name: Upload C++ Artifact
      uses: actions/upload-artifact@v4
      with:
        name: transparency-cpp-win
        path: build/Release/Transparency.exe

  build-electron:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      working-directory: device-monitor-desktop
      run: npm install
    - name: Build Electron app (Windows)
      working-directory: device-monitor-desktop
      run: npm run build:win
    - name: Upload Electron NSIS installer
      uses: actions/upload-artifact@v4
      with:
        name: electron-win-installer
        path: device-monitor-desktop/dist/*.exe
    - name: Upload Electron ZIP
      uses: actions/upload-artifact@v4
      with:
        name: electron-win-zip
        path: device-monitor-desktop/dist/*.zip

  release:
    needs: [build-cpp, build-electron]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    - name: List downloaded files
      run: find . -type f | sort
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          transparency-cpp-win/Transparency.exe
          electron-win-installer/*.exe
          electron-win-zip/*.zip
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
