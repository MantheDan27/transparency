name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: device-monitor-desktop/package-lock.json

    - name: Install dependencies
      run: |
        cd device-monitor-desktop
        npm install

    - name: Build Windows executable
      run: |
        cd device-monitor-desktop
        npm run build:win

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        path: device-monitor-desktop/dist/*.exe

    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          device-monitor-desktop/dist/*.exe
          device-monitor-desktop/dist/*.AppImage
          device-monitor-desktop/dist/*.zip
          device-monitor-desktop/dist/*.snap
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
