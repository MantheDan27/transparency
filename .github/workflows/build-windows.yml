name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cpp:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
    - name: Configure CMake
      run: cmake -B build -S transparency-cpp -DCMAKE_BUILD_TYPE=Release
    - name: Build Transparency C++ App
      run: cmake --build build --config Release
    - name: Upload C++ Artifact
      uses: actions/upload-artifact@v4
      with:
        name: transparency-cpp-win
        path: build/Release/Transparency.exe

  build-native:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Build Native App
      run: |
        cd transparency-native/TransparencyApp
        dotnet publish -c Release -r win-x64 --self-contained true
    - name: Upload Native Artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-v2
        path: transparency-native/TransparencyApp/bin/Release/net10.0-windows/win-x64/publish/

  build-electron-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: |
        cd device-monitor-desktop
        npm ci
    - name: Build Electron app (Windows)
      run: |
        cd device-monitor-desktop
        npm run build:win
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: electron-win-installer
        path: device-monitor-desktop/dist/*.exe
    - name: Upload Windows ZIP
      uses: actions/upload-artifact@v4
      with:
        name: electron-win-zip
        path: device-monitor-desktop/dist/*.zip

  build-electron-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install system dependencies
      run: sudo apt-get install -y libarchive-tools rpm
    - name: Install dependencies
      run: |
        cd device-monitor-desktop
        npm ci
    - name: Build Electron app (Linux)
      run: |
        cd device-monitor-desktop
        npm run build:linux
    - name: Upload Linux AppImage
      uses: actions/upload-artifact@v4
      with:
        name: electron-linux-appimage
        path: device-monitor-desktop/dist/*.AppImage

  release:
    needs: [build-cpp, build-native, build-electron-windows, build-electron-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    - name: Create ZIP for Native App
      run: |
        cd native-v2 && zip -r ../TransparencyApp-Native.zip . && cd ..
    - name: List downloaded files
      run: find . -type f | sort
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          transparency-cpp-win/Transparency.exe
          TransparencyApp-Native.zip
          electron-win-installer/*.exe
          electron-win-zip/*.zip
          electron-linux-appimage/*.AppImage
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
