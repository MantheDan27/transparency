name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-native:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Build Native App
      run: |
        cd transparency-native/TransparencyApp
        dotnet publish -c Release -r win-x64 --self-contained true
    - name: Upload Native Artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-v2
        path: transparency-native/TransparencyApp/bin/Release/net10.0-windows/win-x64/publish/

  release:
    needs: [build-native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    - name: Create ZIP for Native App
      run: |
        cd native-v2 && zip -r ../TransparencyApp-Native.zip . && cd ..
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          TransparencyApp-Native.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
