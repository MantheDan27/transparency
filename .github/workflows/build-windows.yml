name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cpp:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
    - name: Configure CMake
      run: cmake -B build -S transparency-cpp -DCMAKE_BUILD_TYPE=Release
    - name: Build Transparency C++ App
      run: cmake --build build --config Release
    - name: Upload C++ Artifact
      uses: actions/upload-artifact@v4
      with:
        name: transparency-cpp-win
        path: build/Release/Transparency.exe

  build-native:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    - name: Publish .NET Native App
      run: dotnet publish transparency-native/TransparencyApp/TransparencyApp.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish-native
    - name: Upload Native Artifact
      uses: actions/upload-artifact@v4
      with:
        name: transparency-native-win
        path: publish-native/TransparencyApp.exe

  release:
    needs: [build-cpp, build-native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    - name: List downloaded files
      run: find . -type f | sort
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          transparency-cpp-win/Transparency.exe
          transparency-native-win/TransparencyApp.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
